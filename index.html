<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Idea Studio</title>
<style>
:root{--bg:#f4f6f9;--panel:#fff;--ink:#1d2733;--muted:#6b7785;--line:#e2e8f0;--navy:#1f3a5f;
 --accent:#2f6fb0;--label:#0f766e;--keep:#1f9d57;--kill:#d8533b;--warn:#e6a700;
 --seed:#9aa6b2;--dev:#3f86c4;--prom:#1f9d57;--ai:#7c3aed;--chip:#eef2f7;}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{background:var(--navy);color:#fff;padding:8px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:15px;margin:0;font-weight:700}
.stats{display:flex;gap:12px;font-size:12px;flex-wrap:wrap}
.stats b{font-size:13px}
.spacer{flex:1}
.btn{background:#2f6fb0;color:#fff;border:0;border-radius:6px;padding:6px 11px;font-size:12.5px;font-weight:600}
.btn.ghost{background:rgba(255,255,255,.16)}
.btn.sm{padding:5px 9px;font-size:12px}
#syncState{font-size:12px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.16);cursor:pointer}
#syncState.ok{background:var(--keep)} #syncState.busy{background:var(--warn);color:#3a2c00} #syncState.err{background:var(--kill)} #syncState.off{background:rgba(255,255,255,.16)}
#toolbar{background:var(--panel);border-bottom:1px solid var(--line);padding:7px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#toolbar select,#toolbar input{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink)}
#search{min-width:150px;flex:1;max-width:300px}
.lbl{font-size:11px;color:var(--muted)}
#listToggle{display:none}
#body{flex:1;display:flex;min-height:0;position:relative}
#list{width:330px;border-right:1px solid var(--line);overflow:auto;background:#fbfcfe;-webkit-overflow-scrolling:touch}
.litem{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.litem:hover{background:#eef4fb}
.litem.active{background:#e3eefb;box-shadow:inset 3px 0 0 var(--accent)}
.litem.killed .ttl{text-decoration:line-through;color:#aab2bd}
.litem .t{flex:1;min-width:0}
.litem .ttl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litem .sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff;white-space:nowrap;align-self:center}
.mk{font-size:12px;width:14px;text-align:center}
.mk.keep{color:var(--keep)} .mk.kill{color:var(--kill)}
.grouphdr{position:sticky;top:0;background:#eef2f7;color:var(--navy);font-size:11px;font-weight:700;padding:5px 12px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px}
#overlay{display:none;position:absolute;inset:0;background:rgba(20,30,45,.4);z-index:5}
#main{flex:1;overflow:auto;padding:18px 22px;-webkit-overflow-scrolling:touch}
.card{max-width:760px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;box-shadow:0 1px 3px rgba(20,40,70,.06)}
.crumbs{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.chip{background:var(--chip);color:var(--navy);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.chip.muted{color:var(--muted);font-weight:500}
.elixir{font-size:21px;font-weight:700;line-height:1.25;margin:6px 0 2px}
.gist{background:#f0f7ff;border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 6px 6px 0;font-size:14px;line-height:1.45;margin:10px 0 4px;color:#244}
.gist .gl{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.fields{margin:14px 0 4px}
.f{margin:10px 0}
.f .k,.scoregrp .k{font-size:11px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.f .v{font-size:14.5px;line-height:1.5;white-space:pre-wrap}
.f .v.empty{color:#b6bfc9;font-style:italic}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}
.scorebar{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.dots{display:flex;gap:5px}
.dot{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center}
.dot.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.dot.auto.on{background:#bcd4ec;border-color:#bcd4ec;color:#36506b}
.autohint{font-size:10px;color:#9aa6b2;margin-top:3px}
.newscore{font-size:13px;color:var(--muted)} .newscore b{font-size:18px;color:var(--navy)}
.verdict{display:flex;gap:10px}
.vbtn{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--muted)}
.vbtn.keep.on{background:var(--keep);color:#fff;border-color:var(--keep)}
.vbtn.kill.on{background:var(--kill);color:#fff;border-color:var(--kill)}
textarea{width:100%;min-height:90px;font-family:inherit;font-size:14px;line-height:1.5;padding:10px 12px;border:1px solid var(--line);border-radius:8px;resize:vertical}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px}
.help{font-size:11.5px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.8}
kbd{background:#eef2f7;border:1px solid #d4dde7;border-bottom-width:2px;border-radius:4px;padding:1px 5px;font-size:11px;font-family:inherit}
.emptymsg{max-width:560px;margin:8vh auto;text-align:center;color:var(--muted);line-height:1.6}
.emptymsg h2{color:var(--ink);font-size:20px}
.banner{max-width:760px;margin:0 auto 14px;background:#fff7e0;border:1px solid #f0dca0;color:#7a5d00;font-size:12.5px;padding:9px 13px;border-radius:8px}
.killnote{max-width:760px;margin:0 auto 14px;background:#fdeee9;border:1px solid #f3c9bb;color:#8a4631;font-size:12px;padding:8px 13px;border-radius:8px}
/* modal */
#modal{display:none;position:fixed;inset:0;background:rgba(15,25,40,.55);z-index:20;align-items:center;justify-content:center;padding:16px}
#modal .box{background:#fff;border-radius:12px;max-width:460px;width:100%;padding:22px;max-height:90vh;overflow:auto}
#modal h2{margin:0 0 4px;font-size:18px;color:var(--navy)}
#modal p{font-size:13px;color:var(--muted);line-height:1.5;margin:6px 0}
#modal label{display:block;font-size:11px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.4px;margin:11px 0 3px}
#modal input{width:100%;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:7px}
#modal .row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.mini{font-size:11px;color:#9aa6b2;margin-top:3px}
@media (max-width:820px){
  #listToggle{display:inline-block}
  #list{position:absolute;z-index:6;top:0;bottom:0;left:0;width:84%;max-width:330px;transform:translateX(-102%);transition:transform .22s;box-shadow:2px 0 16px rgba(0,0,0,.18)}
  #list.open{transform:translateX(0)}
  #overlay.show{display:block}
  #main{padding:14px}
  .card{padding:16px 15px;border-radius:10px}
  .elixir{font-size:19px}
  header h1{font-size:14px} .stats{font-size:11px;gap:9px}
  .help{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="btn ghost sm" id="listToggle">☰</button>
    <h1>📚 Idea Studio</h1>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <span id="syncState" class="off" title="Sync settings">not connected</span>
    <button class="btn ghost sm" id="syncBtn" title="Sync now">⟳</button>
    <button class="btn ghost sm" id="gearBtn" title="Settings">⚙</button>
  </header>
  <div id="toolbar">
    <input id="search" placeholder="Search…">
    <span class="lbl">Theme</span><select id="fTheme"></select>
    <span class="lbl">Bucket</span>
    <select id="fBucket">
      <option value="">All buckets</option>
      <option value="AI-gen">🤖 AI-gen (kill fast)</option>
      <option value="Promising">Promising (focus)</option>
      <option value="Developing">Developing</option>
      <option value="Seedling">Seedling (skim)</option>
    </select>
    <span class="lbl">Status</span>
    <select id="fStatus">
      <option value="">All</option>
      <option value="unreviewed">Unreviewed</option>
      <option value="reviewed">Reviewed</option>
      <option value="keep">Kept</option>
      <option value="kill">Killed</option>
      <option value="undecided">No verdict</option>
      <option value="recent">✦ Recent (unnumbered)</option>
    </select>
    <span class="lbl">Sort</span>
    <select id="fSort">
      <option value="bucket">Bucket (AI-gen first)</option>
      <option value="theme">Theme</option>
      <option value="score">New score</option>
      <option value="old">Old rating</option>
    </select>
  </div>
  <div id="body">
    <div id="list"></div>
    <div id="overlay"></div>
    <div id="main"></div>
  </div>
</div>

<div id="modal"><div class="box">
  <h2>Sync settings</h2>
  <p>Connects this app to your <b>private</b> GitHub data repo so your edits sync across devices. Your token is stored only on this device.</p>
  <label>GitHub username (owner)</label><input id="cfgOwner" placeholder="e.g. namwasabi">
  <label>Data repository name</label><input id="cfgRepo" placeholder="e.g. idea-studio-data">
  <label>Branch</label><input id="cfgBranch" placeholder="main" value="main">
  <label>File path in repo</label><input id="cfgPath" placeholder="ideas_data.json" value="ideas_data.json">
  <label>Access token (fine-grained PAT)</label><input id="cfgToken" type="password" placeholder="github_pat_…">
  <div class="mini">Token needs only: this repo → Contents → Read &amp; write. See README for steps.</div>
  <div class="row">
    <button class="btn" id="cfgConnect">Connect &amp; pull</button>
    <button class="btn ghost" id="cfgExport">Export JSON</button>
    <button class="btn ghost" id="cfgImport">Import JSON</button>
    <button class="btn ghost" id="cfgCsv">Export CSV</button>
    <button class="btn ghost" id="cfgClose" style="margin-left:auto">Close</button>
  </div>
  <div class="mini" id="cfgMsg" style="margin-top:10px"></div>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div></div>

<script>
const BUCKETS={Seedling:1,Developing:2,Promising:3,"AI-gen":4};
const LS_DATA='ideastudio_data', LS_CFG='ideastudio_cfg';
let IDEAS=[], cfg=null, sha=null, current=null, dirty=false, pushTimer=null, pulling=false;
const $=s=>document.querySelector(s);
const b64e=s=>btoa(unescape(encodeURIComponent(s)));
const b64d=b=>decodeURIComponent(escape(atob(b.replace(/\n/g,''))));

/* ---------- storage ---------- */
function loadLocal(){try{const d=JSON.parse(localStorage.getItem(LS_DATA));if(Array.isArray(d))IDEAS=d;}catch(e){}
  try{cfg=JSON.parse(localStorage.getItem(LS_CFG))||null;}catch(e){cfg=null;}}
function saveLocal(){localStorage.setItem(LS_DATA,JSON.stringify(IDEAS));}
function saveCfg(){localStorage.setItem(LS_CFG,JSON.stringify(cfg));}

/* ---------- sync UI ---------- */
function setSync(state,txt){const el=$('#syncState');el.className=state;el.textContent=txt;}
function syncLabel(){
  if(!cfg){setSync('off','not connected');return;}
  if(dirty)setSync('busy','unsynced…');else setSync('ok','synced ✓');}

/* ---------- GitHub API ---------- */
function ghUrl(){return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;}
function ghHeaders(){return {'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};}
async function ghGet(){
  const r=await fetch(ghUrl()+'?ref='+encodeURIComponent(cfg.branch)+'&t='+Date.now(),{headers:ghHeaders(),cache:'no-store'});
  if(r.status===404)return {data:null,sha:null};
  if(!r.ok)throw new Error('GitHub read '+r.status+(r.status===401?' (bad token)':r.status===403?' (no access/rate limit)':''));
  const j=await r.json();
  let content=j.content;
  if(!content&&j.sha){ // file >1MB: Contents API omits inline content, fetch via Blobs API (up to 100MB)
    const br=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/git/blobs/${j.sha}`,{headers:ghHeaders(),cache:'no-store'});
    if(!br.ok)throw new Error('GitHub blob read '+br.status);
    content=(await br.json()).content;}
  return {data:JSON.parse(b64d(content)),sha:j.sha};}
async function ghPut(arr,msg,curSha){
  const body={message:msg||('Update '+new Date().toISOString()),content:b64e(JSON.stringify(arr,null,1)),branch:cfg.branch};
  if(curSha)body.sha=curSha;
  const r=await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw Object.assign(new Error('GitHub write '+r.status),{status:r.status,detail:t});}
  return (await r.json()).content.sha;}

function mergeById(a,b){ // newest _m wins per id; union of ids
  const m={}; (a||[]).forEach(o=>m[o.id]=o);
  (b||[]).forEach(o=>{const e=m[o.id]; if(!e||(o._m||0)>(e._m||0))m[o.id]=o;});
  return Object.values(m);}

async function pull(){
  if(!cfg||pulling)return; pulling=true;
  try{setSync('busy','syncing…');
    const {data,sha:s}=await ghGet();
    if(data){IDEAS=mergeById(IDEAS,data);saveLocal();}
    sha=s; render(); syncLabel();
  }catch(e){setSync('err','sync error');$('#cfgMsg').textContent=e.message;}
  finally{pulling=false;}}

async function push(){
  if(!cfg){saveLocal();return;}
  try{setSync('busy','saving…');
    try{sha=await ghPut(IDEAS,'edit from web',sha);}
    catch(e){ if(e.status===409||(e.detail&&/sha/i.test(e.detail))){ // conflict: merge then retry
        const {data,sha:s}=await ghGet(); IDEAS=mergeById(IDEAS,data); sha=s;
        sha=await ghPut(IDEAS,'edit (merged)',sha); render();
      } else throw e; }
    dirty=false; saveLocal(); syncLabel();
  }catch(e){dirty=true;setSync('err','offline — saved locally');}}

function schedulePush(){dirty=true;syncLabel();saveLocal();
  if(!cfg)return; clearTimeout(pushTimer); pushTimer=setTimeout(push,1800);}

/* ---------- filtering / list ---------- */
function filtered(){
  const q=$('#search').value.trim().toLowerCase(),th=$('#fTheme').value,bk=$('#fBucket').value,st=$('#fStatus').value;
  let arr=IDEAS.filter(o=>{
    if(th&&o.theme!==th)return false;
    if(bk&&o.bucket!==bk)return false;
    if(st==='unreviewed'&&o.reviewed)return false;
    if(st==='reviewed'&&!o.reviewed)return false;
    if(st==='keep'&&o.decision!=='keep')return false;
    if(st==='kill'&&o.decision!=='kill')return false;
    if(st==='undecided'&&o.decision)return false;
    if(st==='recent'&&!o.recent)return false;
    if(q){const h=(o.id+' '+o.elixir+' '+o.summary+' '+o.logline+' '+o.desc+' '+(o.notes||'')).toLowerCase();if(!h.includes(q))return false;}
    return true;});
  const sort=$('#fSort').value;
  arr.sort((a,b)=>{
    if(sort==='bucket'){const d=BUCKETS[b.bucket]-BUCKETS[a.bucket];if(d)return d;return (b.oldRating||0)-(a.oldRating||0);}
    if(sort==='theme'){if(a.theme!==b.theme)return a.theme<b.theme?-1:1;return BUCKETS[b.bucket]-BUCKETS[a.bucket];}
    if(sort==='score')return ((b.commercial+b.originality)||-1)-((a.commercial+a.originality)||-1);
    if(sort==='old')return (b.oldRating||0)-(a.oldRating||0);
    return 0;});
  return arr;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function bkColor(b){return b==='AI-gen'?'#7c3aed':b==='Promising'?'#1f9d57':b==='Developing'?'#3f86c4':'#9aa6b2';}
function renderList(){
  const arr=filtered(),list=$('#list');list.innerHTML='';const sort=$('#fSort').value;let last=null;
  arr.forEach(o=>{
    let grp=sort==='theme'?o.theme:(sort==='bucket'?o.bucket+' bucket':null);
    if(grp&&grp!==last){const h=document.createElement('div');h.className='grouphdr';h.textContent=grp;list.appendChild(h);last=grp;}
    const d=document.createElement('div');d.className='litem'+(current===o.id?' active':'')+(o.decision==='kill'?' killed':'');
    const mk=o.decision==='keep'?'<span class="mk keep">✓</span>':o.decision==='kill'?'<span class="mk kill">✕</span>':'<span class="mk"></span>';
    d.innerHTML=mk+'<div class="t"><div class="ttl">'+esc(o.elixir||o.summary||o.logline||o.desc||'(untitled)')+'</div>'+
      '<div class="sub">#'+o.id+' · '+esc(o.theme)+(o.recent?' · ✦recent':'')+(o.reviewed?' · reviewed':'')+'</div></div>'+
      '<span class="bk" style="background:'+bkColor(o.bucket)+'">'+(o.aiGen?'AI':o.bucket[0])+'</span>';
    d.onclick=()=>{current=o.id;closeDrawer();render();};list.appendChild(d);});
  if(!arr.length)list.innerHTML='<div style="padding:20px;color:#6b7785;font-size:13px">No ideas match these filters.</div>';
  return arr;}

/* ---------- card ---------- */
function renderCard(arr){
  const main=$('#main');
  if(!IDEAS.length){
    main.innerHTML='<div class="emptymsg"><h2>Welcome to Idea Studio</h2>'+
      '<p>No data loaded on this device yet.</p>'+
      '<p>Tap <b>⚙ Settings</b> to connect your private GitHub data repo (one-time), and your 1,228 ideas will sync here. See the README for the 5-minute setup.</p>'+
      '<p style="margin-top:14px"><button class="btn" onclick="openModal()">⚙ Set up sync</button> '+
      '<button class="btn ghost" onclick="$(\'#importFile\').click()">Import a JSON backup</button></p></div>';
    return;}
  const o=IDEAS.find(x=>x.id===current)||arr[0]; if(o)current=o.id;
  if(!o){main.innerHTML='<div class="emptymsg">Select an idea.</div>';return;}
  const idx=arr.findIndex(x=>x.id===o.id),ns=(o.commercial!=null&&o.originality!=null)?o.commercial+o.originality:null;
  const fld=(k,v)=>'<div class="f"><div class="k">'+k+'</div><div class="v'+(v?'':' empty')+'">'+(v?esc(v):'— none —')+'</div></div>';
  const dots=(g,val)=>{let h='<div class="dots">';for(let i=1;i<=5;i++)h+='<div class="dot'+(o.autoScored?' auto':'')+(val===i?' on':'')+'" data-g="'+g+'" data-v="'+i+'">'+i+'</div>';return h+'</div>';};
  const killnote=o.decision==='kill'?'<div class="killnote">✕ Killed — but <b>not deleted</b>. It stays in your data (filter Status → Killed) and still exports. Tap Kill again to revive.</div>':'';
  main.innerHTML=killnote+'<div class="card">'+
    '<div class="crumbs"><span class="chip">'+esc(o.theme)+'</span>'+
      '<span class="chip" style="background:'+bkColor(o.bucket)+';color:#fff">'+o.bucket+'</span>'+
      '<span class="chip muted">#'+o.id+'</span>'+
      (o.oldRating!=null?'<span class="chip muted">old '+o.oldRating+'</span>':'')+
      '<span class="chip muted">'+o.wordcount+'w</span>'+
      (o.recent?'<span class="chip" style="background:#b45309;color:#fff">✦ recent</span>':'')+
      (o.crowded?'<span class="chip muted">crowded theme</span>':'')+
    '</div>'+
    '<div class="elixir">'+esc(o.elixir||'(no core theme)')+'</div>'+
    (o.summary?'<div class="gist"><span class="gl">Quick read</span>'+esc(o.summary)+'</div>':'')+
    '<div class="fields">'+fld('Logline',o.logline)+fld('Description',o.desc)+
      (o.chars?fld('Characters',o.chars):'')+(o.struct?fld('Structure',o.struct):'')+'</div><hr>'+
    '<div class="scorebar">'+
      '<div class="scoregrp"><div class="k">Commercial appeal</div>'+dots('commercial',o.commercial)+(o.autoScored?'<div class="autohint">default — adjust to confirm</div>':'')+'</div>'+
      '<div class="scoregrp"><div class="k">Originality</div>'+dots('originality',o.originality)+(o.autoScored?'<div class="autohint">default — adjust to confirm</div>':'')+'</div>'+
      '<div class="scoregrp"><div class="k">New score</div><div class="newscore"><b>'+(ns!=null?ns:'–')+'</b> / 10</div></div>'+
      '<div class="scoregrp"><div class="k">Verdict</div><div class="verdict">'+
        '<button class="vbtn keep'+(o.decision==='keep'?' on':'')+'" data-dec="keep">Keep</button>'+
        '<button class="vbtn kill'+(o.decision==='kill'?' on':'')+'" data-dec="kill">Kill</button></div></div></div>'+
    '<div class="f" style="margin-top:16px"><div class="k">Notes — expand the idea</div>'+
      '<textarea id="notes" placeholder="Jot a twist, a B-story, who it\'s for, what to research…">'+esc(o.notes||'')+'</textarea></div>'+
    '<div class="nav"><button class="btn ghost" id="prev">‹ Prev</button>'+
      '<span style="font-size:12px;color:var(--muted)">'+(idx+1)+' / '+arr.length+'</span>'+
      '<button class="btn" id="next">Next ›</button></div>'+
    '<div class="help"><kbd>↑</kbd><kbd>↓</kbd> nav · <kbd>1</kbd>–<kbd>5</kbd> commercial · <kbd>Shift</kbd>+<kbd>1</kbd>–<kbd>5</kbd> originality · <kbd>K</kbd> keep · <kbd>X</kbd> kill · <kbd>N</kbd> notes</div></div>';
  main.querySelectorAll('.dot').forEach(d=>d.onclick=()=>setScore(o,d.dataset.g,+d.dataset.v));
  main.querySelectorAll('.vbtn').forEach(b=>b.onclick=()=>{o.decision=(o.decision===b.dataset.dec)?'':b.dataset.dec;mark(o);});
  const ta=$('#notes');if(ta)ta.oninput=()=>{o.notes=ta.value;o._m=Date.now();o.reviewed=true;schedulePush();renderStats();};
  $('#prev').onclick=()=>move(arr,-1);$('#next').onclick=()=>move(arr,1);}

function setScore(o,g,v){o[g]=(o[g]===v?null:v);o.autoScored=false;mark(o);}
function mark(o){o.reviewed=true;o._m=Date.now();schedulePush();render();}
function move(arr,d){const i=arr.findIndex(x=>x.id===current),j=i+d;if(j>=0&&j<arr.length){current=arr[j].id;render();$('#main').scrollTop=0;}}
function renderStats(){const t=IDEAS.length,rev=IDEAS.filter(o=>o.reviewed).length,
  keep=IDEAS.filter(o=>o.decision==='keep').length,kill=IDEAS.filter(o=>o.decision==='kill').length;
  $('#stats').innerHTML='<span>Rev <b>'+rev+'</b>/'+t+'</span><span style="color:#9ff5c4">Keep <b>'+keep+'</b></span><span style="color:#ffc4b8">Kill <b>'+kill+'</b></span>';}
function render(){renderStats();renderCard(renderList());}
function initThemes(){const th=[...new Set(IDEAS.map(o=>o.theme))].sort();
  $('#fTheme').innerHTML='<option value="">All themes</option>'+th.map(t=>'<option>'+esc(t)+'</option>').join('');}

/* ---------- drawer ---------- */
function openDrawer(){$('#list').classList.add('open');$('#overlay').classList.add('show');}
function closeDrawer(){$('#list').classList.remove('open');$('#overlay').classList.remove('show');}
$('#listToggle').onclick=()=>$('#list').classList.contains('open')?closeDrawer():openDrawer();
$('#overlay').onclick=closeDrawer;

/* ---------- modal / config ---------- */
function openModal(){if(cfg){$('#cfgOwner').value=cfg.owner||'';$('#cfgRepo').value=cfg.repo||'';$('#cfgBranch').value=cfg.branch||'main';$('#cfgPath').value=cfg.path||'ideas_data.json';$('#cfgToken').value=cfg.token||'';}$('#modal').style.display='flex';}
function closeModal(){$('#modal').style.display='none';}
window.openModal=openModal;
$('#gearBtn').onclick=openModal;$('#syncState').onclick=openModal;$('#cfgClose').onclick=closeModal;
$('#cfgConnect').onclick=async()=>{
  cfg={owner:$('#cfgOwner').value.trim(),repo:$('#cfgRepo').value.trim(),branch:($('#cfgBranch').value.trim()||'main'),path:($('#cfgPath').value.trim()||'ideas_data.json'),token:$('#cfgToken').value.trim()};
  if(!cfg.owner||!cfg.repo||!cfg.token){$('#cfgMsg').textContent='Fill owner, repo and token.';return;}
  saveCfg();$('#cfgMsg').textContent='Connecting…';
  try{const {data,sha:s}=await ghGet();
    if(data){IDEAS=mergeById(IDEAS,data);saveLocal();}
    sha=s;initThemes();render();syncLabel();$('#cfgMsg').textContent=data?('Connected — '+IDEAS.length+' ideas loaded.'):'Connected — repo empty; your local data will be pushed on next edit.';
    if(!data&&IDEAS.length){await push();}
  }catch(e){$('#cfgMsg').textContent=e.message;setSync('err','sync error');}};
$('#syncBtn').onclick=()=>cfg?pull():openModal();
/* export / import */
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);}
$('#cfgExport').onclick=()=>dl(new Blob([JSON.stringify(IDEAS,null,1)],{type:'application/json'}),'ideas_data.json');
$('#cfgCsv').onclick=()=>{const cols=['id','theme','bucket','aiGen','recent','oldRating','commercial','originality','newScore','decision','reviewed','wordcount','elixir','summary','logline','desc','notes'];
  const e=v=>{v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const rows=[cols.join(',')];IDEAS.forEach(o=>{const ns=(o.commercial!=null&&o.originality!=null)?o.commercial+o.originality:'';rows.push(cols.map(c=>e(c==='newScore'?ns:o[c])).join(','));});
  dl(new Blob(['﻿'+rows.join('\n')],{type:'text/csv'}),'ideas_review.csv');};
$('#cfgImport').onclick=()=>$('#importFile').click();
$('#importFile').onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);IDEAS=mergeById(IDEAS,d);saveLocal();initThemes();render();$('#cfgMsg').textContent='Imported '+d.length+' ideas.';if(cfg)schedulePush();}catch(e){alert('Bad JSON');}};r.readAsText(f);};

/* keyboard (desktop) */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'){if(e.key==='Escape')e.target.blur();return;}
  if($('#modal').style.display==='flex')return;
  const o=IDEAS.find(x=>x.id===current),arr=filtered();
  if(e.key==='ArrowDown'){e.preventDefault();move(arr,1);}
  else if(e.key==='ArrowUp'){e.preventDefault();move(arr,-1);}
  else if(o&&/^[1-5]$/.test(e.key))setScore(o,e.shiftKey?'originality':'commercial',+e.key);
  else if(o&&e.key.toLowerCase()==='k'){o.decision=o.decision==='keep'?'':'keep';mark(o);}
  else if(o&&e.key.toLowerCase()==='x'){o.decision=o.decision==='kill'?'':'kill';mark(o);}
  else if(o&&e.key.toLowerCase()==='n'){const ta=$('#notes');if(ta){e.preventDefault();ta.focus();}}});
['#search','#fTheme','#fBucket','#fStatus','#fSort'].forEach(s=>$(s).addEventListener('input',render));
window.addEventListener('focus',()=>{if(cfg&&!dirty)pull();});

/* ---------- boot ---------- */
loadLocal();initThemes();
current=filtered()[0]?filtered()[0].id:null;
render();syncLabel();
if(cfg)pull();
</script>
</body>
</html>
